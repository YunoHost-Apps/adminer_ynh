packaging_format = 2

id = "adminer"
name = "Adminer"
description.en = "Database management tool"
description.fr = "Gestionnaire de base de données"

version = "5.4.1~ynh1"

maintainers = []

[upstream]
license = "Apache-2.0"
website = "https://docs.adminerevo.org/"
demo = "https://demo.adminer.org/adminer.php?username="
admindoc = "https://docs.adminerevo.org/"
code = "https://github.com/vrana/adminer"
fund = "https://www.patreon.com/jakubvrana"

[integration]
yunohost = ">= 12.1.17"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "100M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/adminer"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.admin]
    type = "user"

[resources]

    [resources.sources]

    [resources.sources.main]
    url = "https://github.com/vrana/adminer/releases/download/v5.4.1/adminer-5.4.1.php"
    sha256 = "3f65364b4cc96b5e4cae1b3e448b7b6fa42b0da1eeba78bed9b3774ade830fce"
    rename= "index.php"
    in_subdir = false

    [resources.system_user]

    [resources.install_dir]
    group = "www-data:r-x"

    [resources.permissions]
    main.url = "/"

    [resources.apt]
    packages = "php8.4-mysql, php8.4-sqlite3, php8.4-pgsql"
